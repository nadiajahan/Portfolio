// ── useTweaks ───────────────────────────────────────────────────────────────
// Single source of truth for tweak values. setTweak persists via the host
// (__edit_mode_set_keys → host rewrites the EDITMODE block on disk).
function useTweaks(defaults) {
  const [values, setValues] = React.useState(defaults);
  // Accepts either setTweak('key', value) or setTweak({ key: value, ... }) so a
  // useState-style call doesn't write a "[object Object]" key into the persisted
  // JSON block.
  const setTweak = React.useCallback((keyOrEdits, val) => {
    const edits = typeof keyOrEdits === 'object' && keyOrEdits !== null ?
    keyOrEdits : { [keyOrEdits]: val };
    setValues((prev) => ({ ...prev, ...edits }));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits }, '*');
  }, []);
  return [values, setTweak];
}

// ── TweaksPanel ─────────────────────────────────────────────────────────────
// Floating shell. Registers the protocol listener BEFORE announcing
// availability — if the announce ran first, the host's activate could land
// before our handler exists and the toolbar toggle would silently no-op.
// The close button posts __edit_mode_dismissed so the host's toolbar toggle
// flips off in lockstep; the host echoes __deactivate_edit_mode back which
// is what actually hides the panel.
function TweaksPanel({ title = 'Tweaks', children }) {
  const [open, setOpen] = React.useState(false);
  const dragRef = React.useRef(null);
  const offsetRef = React.useRef({ x: 16, y: 16 });
  const PAD = 16;

  const clampToViewport = React.useCallback(() => {
    const panel = dragRef.current;
    if (!panel) return;
    const w = panel.offsetWidth,h = panel.offsetHeight;
    const maxRight = Math.max(PAD, window.innerWidth - w - PAD);
    const maxBottom = Math.max(PAD, window.innerHeight - h - PAD);
    offsetRef.current = {
      x: Math.min(maxRight, Math.max(PAD, offsetRef.current.x)),
      y: Math.min(maxBottom, Math.max(PAD, offsetRef.current.y))
    };
    panel.style.right = offsetRef.current.x + 'px';
    panel.style.bottom = offsetRef.current.y + 'px';
  }, []);

  React.useEffect(() => {
    if (!open) return;
    clampToViewport();
    if (typeof ResizeObserver === 'undefined') {
      window.addEventListener('resize', clampToViewport);
      return () => window.removeEventListener('resize', clampToViewport);
    }
    const ro = new ResizeObserver(clampToViewport);
    ro.observe(document.documentElement);
    return () => ro.disconnect();
  }, [open, clampToViewport]);

  React.useEffect(() => {
    const onMsg = (e) => {
      const t = e?.data?.type;
      if (t === '__activate_edit_mode') setOpen(true);else
      if (t === '__deactivate_edit_mode') setOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const dismiss = () => {
    setOpen(false);
    window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*');
  };

  const onDragStart = (e) => {
    const panel = dragRef.current;
    if (!panel) return;
    const r = panel.getBoundingClientRect();
    const sx = e.clientX,sy = e.clientY;
    const startRight = window.innerWidth - r.right;
    const startBottom = window.innerHeight - r.bottom;
    const move = (ev) => {
      offsetRef.current = {
        x: startRight - (ev.clientX - sx),
        y: startBottom - (ev.clientY - sy)
      };
      clampToViewport();
    };
    const up = () => {
      window.removeEventListener('mousemove', move);
      window.removeEventListener('mouseup', up);
    };
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
  };

  if (!open) return null;
  return (
    <>
      <style>{__TWEAKS_STYLE}</style>
      <div ref={dragRef} className="twk-panel" data-noncommentable=""
      style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>
        <div className="twk-hd" onMouseDown={onDragStart}>
          <b>{title}</b>
          <button className="twk-x" aria-label="Close tweaks"
          onMouseDown={(e) => e.stopPropagation()}
          onClick={dismiss}>✕</button>
        </div>
        <div className="twk-body">{children}</div>
      </div>
    </>);

}

// ── Layout helpers ──────────────────────────────────────────────────────────

function TweakSection({ label, children }) {
  return (
    <>
      <div className="twk-sect">{label}</div>
      {children}
    </>);

}

function TweakRow({ label, value, children, inline = false }) {
  return (
    <div className={inline ? 'twk-row twk-row-h' : 'twk-row'}>
      <div className="twk-lbl">
        <span>{label}</span>
        {value != null && <span className="twk-val">{value}</span>}
      </div>
      {children}
    </div>);

}

// ── Controls ────────────────────────────────────────────────────────────────

function TweakSlider({ label, value, min = 0, max = 100, step = 1, unit = '', onChange }) {
  return (
    <TweakRow label={label} value={`${value}${unit}`}>
      <input type="range" className="twk-slider" min={min} max={max} step={step}
      value={value} onChange={(e) => onChange(Number(e.target.value))} />
    </TweakRow>);

}

function TweakToggle({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <button type="button" className="twk-toggle" data-on={value ? '1' : '0'}
      role="switch" aria-checked={!!value}
      onClick={() => onChange(!value)}><i /></button>
    </div>);

}

function TweakRadio({ label, value, options, onChange }) {
  const trackRef = React.useRef(null);
  const [dragging, setDragging] = React.useState(false);
  const opts = options.map((o) => typeof o === 'object' ? o : { value: o, label: o });
  const idx = Math.max(0, opts.findIndex((o) => o.value === value));
  const n = opts.length;

  // The active value is read by pointer-move handlers attached for the lifetime
  // of a drag — ref it so a stale closure doesn't fire onChange for every move.
  const valueRef = React.useRef(value);
  valueRef.current = value;

  const segAt = (clientX) => {
    const r = trackRef.current.getBoundingClientRect();
    const inner = r.width - 4;
    const i = Math.floor((clientX - r.left - 2) / inner * n);
    return opts[Math.max(0, Math.min(n - 1, i))].value;
  };

  const onPointerDown = (e) => {
    setDragging(true);
    const v0 = segAt(e.clientX);
    if (v0 !== valueRef.current) onChange(v0);
    const move = (ev) => {
      if (!trackRef.current) return;
      const v = segAt(ev.clientX);
      if (v !== valueRef.current) onChange(v);
    };
    const up = () => {
      setDragging(false);
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };

  return (
    <TweakRow label={label}>
      <div ref={trackRef} role="radiogroup" onPointerDown={onPointerDown}
      className={dragging ? 'twk-seg dragging' : 'twk-seg'}>
        <div className="twk-seg-thumb"
        style={{ left: `calc(2px + ${idx} * (100% - 4px) / ${n})`,
          width: `calc((100% - 4px) / ${n})` }} />
        {opts.map((o) =>
        <button key={o.value} type="button" role="radio" aria-checked={o.value === value}>
            {o.label}
          </button>
        )}
      </div>
    </TweakRow>);

}

function TweakSelect({ label, value, options, onChange }) {
  return (
    <TweakRow label={label}>
      <select className="twk-field" value={value} onChange={(e) => onChange(e.target.value)}>
        {options.map((o) => {
          const v = typeof o === 'object' ? o.value : o;
          const l = typeof o === 'object' ? o.label : o;
          return <option key={v} value={v}>{l}</option>;
        })}
      </select>
    </TweakRow>);

}

function TweakText({ label, value, placeholder, onChange }) {
  return (
    <TweakRow label={label}>
      <input className="twk-field" type="text" value={value} placeholder={placeholder}
      onChange={(e) => onChange(e.target.value)} />
    </TweakRow>);

}

function TweakNumber({ label, value, min, max, step = 1, unit = '', onChange }) {
  const clamp = (n) => {
    if (min != null && n < min) return min;
    if (max != null && n > max) return max;
    return n;
  };
  const startRef = React.useRef({ x: 0, val: 0 });
  const onScrubStart = (e) => {
    e.preventDefault();
    startRef.current = { x: e.clientX, val: value };
    const decimals = (String(step).split('.')[1] || '').length;
    const move = (ev) => {
      const dx = ev.clientX - startRef.current.x;
      const raw = startRef.current.val + dx * step;
      const snapped = Math.round(raw / step) * step;
      onChange(clamp(Number(snapped.toFixed(decimals))));
    };
    const up = () => {
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };
  return (
    <div className="twk-num">
      <span className="twk-num-lbl" onPointerDown={onScrubStart}>{label}</span>
      <input type="number" value={value} min={min} max={max} step={step}
      onChange={(e) => onChange(clamp(Number(e.target.value)))} />
      {unit && <span className="twk-num-unit">{unit}</span>}
    </div>);

}

function TweakColor({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <input type="color" className="twk-swatch" value={value}
      onChange={(e) => onChange(e.target.value)} />
    </div>);

}

function TweakButton({ label, onClick, secondary = false }) {
  return (
    <button type="button" className={secondary ? 'twk-btn secondary' : 'twk-btn'}
    onClick={onClick}>{label}</button>);

}

Object.assign(window, {
  useTweaks, TweaksPanel, TweakSection, TweakRow,
  TweakSlider, TweakToggle, TweakRadio, TweakSelect,
  TweakText, TweakNumber, TweakColor, TweakButton
});

    problem: "Bell's Contact Centre Blueprint was the internal tool guiding agents through troubleshooting flows step by step. The hypothesis: when agents follow it, first call resolution goes up. The problem: agents had almost completely stopped using it. And they'd also stopped submitting feedback on broken flows.\n\nLeadership's instinct was workshops. Mine was different. Before fixing anything, I needed to understand what was actually happening in the moment — not in a training room, but on a live call, with a real customer waiting.",
    role: "UX Researcher on a cross-functional team working on contact centre experience. I owned the research design, recruitment, facilitation, thematic analysis, and synthesis. I also designed the MVP concept and vibe-coded a prototype to make the recommendation tangible enough to fund.",
    process: "The agents I needed to reach were offshore. Traditional contextual inquiry was off the table — I couldn't observe live calls in real time. So I ran a diary study.\n\nI recruited 14-16 offshore agents and walked them through the ask virtually: after any call where you didn't follow the BPI, fill out a short template. Three times a day, for five days. Tell me what the call was about, why you went off-script, and what you did instead.\n\nI expected uneven compliance. What I didn't expect was 60+ call records.\n\nThematic analysis across all of them surfaced 10 distinct workarounds agents had developed on their own to fill the gaps the BPI left behind. The process team was able to map every single one to their roadmap.\n\nBut the more important finding wasn't about the flows. Agents weren't skipping the BPI out of laziness — they'd stopped trusting it. The tool would send them deep into a troubleshooting flow, sometimes several steps in, only to hit a dead end or a flat-out wrong process. They'd have to abandon it mid-call, customer on the line. That happens enough times and you stop using the tool entirely.\n\nThe feedback loop was just as broken. Agents had submitted feedback on bad flows before. Nothing happened — no acknowledgment, no update, no visibility. So they stopped.\n\nI ran a follow-up focus group to understand what transparency would actually need to look like for agents to trust the system again. Three things came back clearly: confirm the feedback was received, show it's being reviewed, and share the outcome — actionable or not, and why.\n\nThe focus group also surfaced something I hadn't anticipated: a whole shadow knowledge system running alongside the official one. When the BPI fails mid-call, agents reach out to team leads (not always reachable) and then to peers over Teams — swapping workarounds that someone once figured out and passed along informally.\n\nI vibe-coded an MVP concept to show stakeholders what a fix could look like — tangible enough to react to, specific enough to fund. A feedback loop that closed the three gaps agents named. And a community hub that brought the peer support system into the BPI tool itself: agents post about a broken flow, others comment with workarounds, an admin can verify the best one as the standardized solution while the team works on implementing it into the actual BPI.",
    impact: "10 agent workarounds identified and actioned into the BPI improvement roadmap. The feedback loop and community hub MVP was funded for development.\n\nThe hypothesis — that standardized BPI use drives higher first call resolution — is now something we can actually test. For the first time in two years, there's a path to moving that number.",

    problem: "A major Canadian telecom was replacing its legacy dispatch tool with ServiceNow. The old tool had accumulated significant technical debt, and the business had bigger ambitions: a move toward automated dispatch the old system couldn't support. ServiceNow was the path forward.\n\nDispatchers are the people who make field operations run. When an L1 agent determines a customer needs a technician on site, that request lands with a dispatcher. They triage tickets, matching the right technician to the right job based on location, availability, and skill set — and get someone moving. It's time-pressured, detail-heavy work. The tool they use isn't a nice-to-have. It's the job.",

    process: "I ran moderated, remote usability tests with 14 dispatchers across multiple sessions — an ongoing study as the project continues to develop. I focused on comprehension and task execution: Could dispatchers read the time on the new Gantt chart accurately with overlapping timezones? Could they assign a technician to a job, configure their view, and parse the information on task cards the way their region's demands required?\n\nSomething I didn't expect: dispatchers were genuinely happy to be involved. They felt heard. Showing them the new tool, asking for their input, treating them as people whose opinion mattered — that meant something to them. It's a reminder that the research process itself is an intervention, not just a means to findings.\n\nComprehension gaps showed up across multiple areas: in how information was displayed, in the language used across the interface, and in flows that assumed a mental model dispatchers didn't have. I compiled findings and fed them back to the project team, ServiceNow, and Atekko. Every conversation was a trade-off. Where adjustments fell within the scope of the dispatch module, there was room to push — and ServiceNow incorporated some of those changes directly. Anything requiring broader platform modifications ran into launch timelines and cost. Those long negotiations mostly ended in the same place: managed in training instead.\n\nAlongside the testing, I designed a feature that didn't exist in ServiceNow's solution: a job details editor that lets dispatchers update ticket information directly. If a customer calls back to change their appointment time, correct an address, or add context for the technician, a dispatcher can make that update in the ticket and have it flow through to the technician's view in real time. The concept was designed, tested, and is now in development.",
    impact: "14 dispatchers tested. A new feature designed, tested, and in development. A clear risk register handed to the business before launch.\n\nA significant portion of usability findings that didn't make it into the product are being managed through training instead. Training is a mitigation, not a fix. Dispatchers are being asked to learn a fundamentally different tool while doing time-sensitive, operationally critical work. The Gantt chart is the heart of a dispatcher's day — comprehension risks there will need to be addressed deliberately in onboarding. Language and mental model mismatches are real, and the dispatchers I tested with were engaged and candid. That goodwill needs to be met with strong support at go-live.\n\nIn another circumstance, I would have pushed to get involved earlier — before the architecture was locked. The findings we surfaced were real; most of them would have been more actionable six months prior. In a project where the big decisions were already made, what I count as my personal win: 14 dispatchers tested, a new feature in development, and a team that goes into launch with eyes open.",

const STORYBOARDS = {
  // "cockpit-retail": { panels: ["img1.jpg","img2.jpg"], captions: ["caption1","caption2"], chapters: [{ title: "The Research", range: [0,2] }] }
};
const FULL_STORYBOARDS = {
  "cockpit-retail": "Cockpit storyboard.png",
  "servicenow-dispatch": "FSM storyboard.png",
  "bell-blueprint": "BPI 3.png",

// ── Storyboard ────────────────────────────────────────────────────────────────
function Storyboard({ caseId }) {
  const entry = STORYBOARDS[caseId];
  if (!entry) return null;
  const { panels = [], captions = [], chapters = [{ title: 'The Story', range: [0, panels.length] }] } = entry;
  const [open, setOpen] = React.useState(false);
  const [idx, setIdx] = React.useState(0);
  React.useEffect(() => {
    if (!open) return;
    const onKey = (e) => {
      if (e.key === 'Escape') setOpen(false);
      else if (e.key === 'ArrowLeft' && idx > 0) setIdx(idx - 1);
      else if (e.key === 'ArrowRight' && idx < panels.length - 1) setIdx(idx + 1);
    };
    window.addEventListener('keydown', onKey);
    document.body.style.overflow = 'hidden';
    return () => { window.removeEventListener('keydown', onKey); document.body.style.overflow = ''; };
  }, [open, idx, panels.length]);
  return (
    <div className="story-wrap">
      <div className="story-label">📖 The research story — scroll or click any panel</div>
      {chapters.map((ch, ci) => (
        <div key={ci} className="story-chapter">
          <div className="story-chapter-head">
            <span className="story-chapter-num">Ch. {ci + 1}</span>
            <span className="story-chapter-title">{ch.title}</span>
            <span className="story-chapter-count">{ch.range[1] - ch.range[0]} panels</span>
          </div>
          <div className="story-strip">
            {panels.slice(ch.range[0], ch.range[1]).map((src, i) => {
              const gi = ch.range[0] + i;
              return (
                <div key={gi} className="story-panel" onClick={() => { setIdx(gi); setOpen(true); }}>
                  <img src={src} alt={captions[gi] || ('Panel ' + (gi + 1))} />
                </div>
              );
            })}
          </div>
        </div>
      ))}
      <div className="story-hint">Tap any panel to expand — use ← / → to navigate</div>
      {open && (
        <div className="sb-lightbox" onClick={() => setOpen(false)}>
          <button className="sb-lb-nav sb-lb-prev" disabled={idx === 0} onClick={(e) => { e.stopPropagation(); if (idx > 0) setIdx(idx - 1); }}>←</button>
          <div className="sb-lb-content" onClick={(e) => e.stopPropagation()}>
            <button className="sb-lb-close" onClick={() => setOpen(false)}>✕</button>
            <img src={panels[idx]} alt={captions[idx] || ''} />
            <div className="sb-lb-counter">{(idx + 1) + ' / ' + panels.length}</div>
          </div>
          <button className="sb-lb-nav sb-lb-next" disabled={idx === panels.length - 1} onClick={(e) => { e.stopPropagation(); if (idx < panels.length - 1) setIdx(idx + 1); }}>→</button>
        </div>
      )}
    </div>
  );
}

function FullStoryboard({ caseId }) {
  const src = FULL_STORYBOARDS[caseId];
  if (!src) return null;
  const [open, setOpen] = React.useState(false);
  React.useEffect(() => {
    if (!open) return;
    const onKey = (e) => { if (e.key === 'Escape') setOpen(false); };
    window.addEventListener('keydown', onKey);
    document.body.style.overflow = 'hidden';
    return () => { window.removeEventListener('keydown', onKey); document.body.style.overflow = ''; };
  }, [open]);
  return (
    <div className="fullstory-wrap">
      <div className="fullstory-label">Tired of reading? I got you. Click the storyboard for a quick visual walkthrough of the research journey, trade-offs, and decisions.</div>
      <div className="fullstory-frame" onClick={() => setOpen(true)}>
        <img src={src} alt="Research storyboard" />
      </div>
      <div className="fullstory-hint">Click the storyboard for a larger view</div>
      {open && (
        <div className="sb-lightbox" onClick={() => setOpen(false)}>
          <div className="sb-lb-content" style={{ maxWidth: 'min(1400px,96vw)' }} onClick={(e) => e.stopPropagation()}>
            <button className="sb-lb-close" onClick={() => setOpen(false)}>✕</button>
            <img src={src} alt="Research storyboard" />
          </div>
        </div>
      )}
    </div>
  );
}

// ── Helpers ──────────────────────────────────────────────────────────────────
function Paras({ text }) {
  return text.split('\n\n').map((p, i) => <p key={i}>{p}</p>);
}
function getStats(text) {
  const stats = [];
  text.split(/\.\s+/).forEach((s) => {
    const pct = s.match(/(\d+)%/);
    if (pct && s.length < 100) stats.push({ num: pct[1] + '%', desc: s.trim() });
    const mult = s.match(/(\d+\.?\d*)×/);
    if (mult && s.length < 100) stats.push({ num: mult[1] + '×', desc: s.trim() });
    const pts = s.match(/(\d+) points?/i);
    if (pts && s.length < 100) stats.push({ num: pts[1] + ' pts', desc: s.trim() });
  });
  return stats.slice(0, 4);
}

// ── App ──────────────────────────────────────────────────────────────────────
function App() {
  const getStateFromHash = () => {
    const hash = window.location.hash.slice(1);
    if (hash.startsWith('study/')) return { view: 'study', studyId: hash.slice(6) };
    if (hash === 'about') return { view: 'about', studyId: null };
    return { view: 'home', studyId: null };
  };

  const initial = getStateFromHash();
  const [view, setView] = React.useState(initial.view);
  const [studyId, setStudyId] = React.useState(initial.studyId);

  React.useEffect(() => {
    const onHashChange = () => {
      const s = getStateFromHash();
      setView(s.view);
      setStudyId(s.studyId);
      window.scrollTo({ top: 0 });
    };
    window.addEventListener('hashchange', onHashChange);
    return () => window.removeEventListener('hashchange', onHashChange);
  }, []);

  const [tweaks, setTweak] = useTweaks(/*EDITMODE-BEGIN*/{
    "accentColor": "#2d4a3e",
    "headlines": "sans"
  } /*EDITMODE-END*/);

  React.useEffect(() => {
    const r = document.documentElement;
    r.style.setProperty('--green', tweaks.accentColor || '#2d4a3e');
    r.style.setProperty('--serif', tweaks.headlines === 'sans' ?
    "'Geist', system-ui, sans-serif" :
    "'Instrument Serif', Georgia, serif");
  }, [tweaks]);

  const go = (v) => { window.location.hash = v === 'home' ? '' : v; };
  const goStudy = (id) => { window.location.hash = 'study/' + id; };

  return (
    <>
      <style>{S}</style>
      <Nav view={view} go={go} />
      {view === 'home' && <Home goStudy={goStudy} />}
      {view === 'study' && studyId && <Study id={studyId} go={go} goStudy={goStudy} />}
      {view === 'about' && <About />}
      <TweaksPanel>
        <TweakSection label="Brand" />
        <TweakColor label="Accent green" value={tweaks.accentColor} onChange={(v) => setTweak('accentColor', v)} />
        <TweakSection label="Typography" />
        <TweakRadio label="Headlines" value={tweaks.headlines} options={['serif', 'sans']} onChange={(v) => setTweak('headlines', v)} />
      </TweaksPanel>
    </>);

}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);

  
  

</script>
